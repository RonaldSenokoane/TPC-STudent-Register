<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Database</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside class="sidebar">
      <img src="images/Logo.png" class="logo" alt="Logo" />

      <a href="register.html" class="nav-button active">Student Register</a>
      <a href="database.html" class="nav-button">Student Database</a>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="left">
          <a class="fa fa-bars"></a>

          <div class="search-box">
            <a class="fa fa-search"></a>
            <input
              type="text"
              placeholder="Search student"
              aria-label="Search student"
            />
          </div>
        </div>

        <div class="right">
          <a class="fa fa-bell"></a>
          <a class="fa fa-comment"></a>

          <a class="profile" onclick="gotToProfile()">
            <div class="profile-icon">P</div>
            <p>Profile</p>
          </a>
        </div>

        <div id="profileModel" class="modal">
          <div class="model-content">
            <span class="close">&times</span>
            <button>My Profile</button>
            <button>Settings</button>
            <button>sign out</button>

          </div>
        </div>

      </header>

      <main class="content">
        <h2>Welcome to Student Database</h2>
        <p>What would you like to do?</p>

        <div class="buttons">
          <button id="addStudent">Add New Student</button>
          <button id="deleteStudent">Delete Student</button>
          <button id="editStudent">Edit Student Info</button>
        </div>
      </main>
    </div>
  </body>
</html>
