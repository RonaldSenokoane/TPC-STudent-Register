<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Student Database</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="Images/AndUsLoginLogo.fb3a99e0b702625499f4 15.png" alt="Logo" class="logo-img" />
    </div>

    <nav class="nav">
      <div class="nav-item" style="position: relative; padding: 20px;">
        <img src="Images/Rectangle 214.png" alt="outer base" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;" />
       
        <a href="#" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-decoration: none; display: block; padding: 10px; width: 100%; text-align: center;">Student Register</a>
      </div>

      <div class="nav-item" style="position: relative; padding: 20px;">
        <img src="Images/Rectangle 214.png" alt="outer base" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0;" />
        <img src="Images/Rectangle 215.png" alt="base" style="position: relative; width: 100%; height: auto; margin: 0.5% auto; display: block;" />
        <a href="#" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-decoration: none; display: block; padding: 10px; width: 100%; text-align: center;">Student Database</a>
      </div>
    </nav>
  </aside>

  <!-- Main Area -->
  <main class="main">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="icon-btn"><img src="Images/Align justify.png" alt="Menu" /></button>
        <div class="search-box">
          <img src="Images/icon.png" alt="Search" class="search-icon" /> <input type="text" placeholder=" search student" />
          
          
        </div>
      </div>

      <div class="header-right">
        <button class="icon-btn"><img src="Images/Message square.png" alt="Message" /></button>
        <button class="icon-btn"><img src="Images/Bell.png" alt="Notification" /></button>
        <button class="profile-btn">
            <img src="Images/p.png" alt="Profile" class="avatar" style="width: 32px; height: 32px;" />
          Profile
        </button>
      </div>
    </header>

    <!-- Content -->
    <section class="content">
      <button class="back-btn">
        <img src="Images/back.png" alt="Back" />
      </button>

      <h2 class="title">
        Welcome to TPC Student Database<br />
        <span>Please fill in the form to add a new student.</span>
      </h2>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <p class="stat-label">AI Development Students</p>
          <p class="stat-value" id="aiStudentCount">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Software Development Students</p>
          <p class="stat-value" id="softwareStudentCount">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Online</p>
          <p class="stat-value" id="onlineCount">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Onsite</p>
          <p class="stat-value" id="onsiteCount">0</p>
        </div>
      </div>

      <!-- Action Card -->
      <div class="card">
        <form class="student-form" id="student-form">
          <fieldset>
        <legend>Personal Information</legend>
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="surname">Surname:</label>
          <input type="text" id="surname" name="surname" required />
        </div>
        <div class="form-group">
          <label for="idNumber">ID Number:</label>
          <input type="text" id="idNumber" name="idNumber" required />
        </div>
        <div class="form-group">
          <label for="cellphone">Cellphone:</label>
          <input type="tel" id="cellphone" name="cellphone" required />
        </div>
        <div class="form-group">
          <label for="address">Address:</label>
          <input type="text" id="address" name="address" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender:</label>
          <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="course">Course:</label>
          <select id="course" name="course" required>
            <option value="">Select Course</option>
            <option value="ai">AI Development</option>
            <option value="software">Software Development</option>
          </select>
        </div>
        <div class="form-group">
          <label for="enrollmentType">Enrollment Type:</label>
          <select id="enrollmentType" name="enrollmentType" required>
            <option value="">Select Enrollment Type</option>
            <option value="online">Online</option>
            <option value="onsite">Onsite</option>
          </select>
        </div>
          </fieldset>

          <fieldset>
        <legend>Attachments</legend>
        <div class="form-group">
          <label for="idCopy">ID Copy:</label>
          <input type="file" id="idCopy" name="idCopy" />
        </div>
        <div class="form-group">
          <label for="bursaryForm">Bursary Form:</label>
          <input type="file" id="bursaryForm" name="bursaryForm" />
        </div>
        <div class="form-group">
          <label for="proofAddress">Proof of Address:</label>
          <input type="file" id="proofAddress" name="proofAddress" />
        </div>
        <div class="form-group">
          <label for="matricCert">Matric Certificate:</label>
          <input type="file" id="matricCert" name="matricCert" />
        </div>
        <div class="form-group">
          <label for="affidavit">Affidavit:</label>
          <input type="file" id="affidavit" name="affidavit" />
        </div>
        <div class="form-group">
          <label for="otherDocs">Other Documents:</label>
          <input type="file" id="otherDocs" name="otherDocs" />
        </div>
          </fieldset>
          
          <div class="form-actions">
        <button type="submit" class="action-btn">Save Student</button>
        <button type="reset" class="action-btn">Cancel</button>
          </div>
        </form>
      </div>
        
       
      </div>
     
    </section>

  </main>

</div>

</body>
</html>
