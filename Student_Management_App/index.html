<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Database</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <aside class="sidebar">
      <img src="images/Logo.png" class="logo" alt="Logo" />

      <a href="register.html" class="nav-button active">Student Register</a>
      <a href="database.html" class="nav-button">Student Database</a>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="left">
          <a class="fa fa-bars"></a>

          <div class="search-box">
            <a class="fa fa-search"></a>
            <input
        
              type="text"
              placeholder="Search student"
              aria-label="Search student"
            
            />
          </div>
        </div>

        <div class="right">
          <a class="fa fa-bell"></a>
          <a class="fa fa-comment"></a>

          <a class="profile" id="profileBtn">
            <div class="profile-icon">P</div>
            <p>Profile</p>
          </a>
        </div>
        
            <div id="profileModal" class="modal">
     
              <div class="modal-content">
              <span class="close">&times;</span>
              <i class="fa fa-user">Profile</i>
              <i class="fa-solid fa-gear">Settings</i>
               <i class="fa-solid fa-right-from-bracket">Sign Out</i>
           </div>  

      </header>

      <main class="content">
        <h2>Welcome to Student Database</h2>
        <p>What would you like to do?</p>

        <div class="buttons">
          <button id="addStudent">Add New Student</button>
          <a href="deletestudent.html"><button id="deleteStudent">Delete Student</button></a>
         
          <button id="editStudent">Edit Student Info</button>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
